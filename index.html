<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WordDock</title>
<style>
:root{
  --bg:#f0f2f5;
  --card:#ffffff;
  --text:#1e293b;
  --muted:#94a3b8;
  --border:#e5e7eb;
  --shadow:0 10px 30px rgba(15,23,42,0.10);
  --radius:18px;
  --danger:#600000;
  --success:#005800;
  --cap:680px;
}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
.shell{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px 18px;gap:12px}
.stage{width:100%;max-width:var(--cap);flex:1;display:flex;flex-direction:column;justify-content:center;gap:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px 30px;min-height:220px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;user-select:none;outline:none;cursor:pointer;position:relative}
.card-tag{font-size:13px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;min-height:1em;position:absolute;top:23%;left:0;right:0;text-align:center}
.card-text{font-size:28px;letter-spacing:.2px;white-space:pre-wrap;line-height:1.4;margin:0}
.state-question{color:#6e6e6e}
.state-answer{color:#000000}
.hint{margin-top:8px;font-size:12px;color:var(--muted);text-align:center;user-select:none;min-height:1.2em}
.btnrow{display:flex;gap:10px;justify-content:center}
button{appearance:none;border:1px solid var(--border);background:#fff;color:var(--text);padding:12px 14px;border-radius:14px;font-size:14px;cursor:pointer;min-width:120px;transition:transform .05s ease}
button:active{transform:translateY(1px)}
button:focus{outline:none}
button:disabled{cursor:default;opacity:1;pointer-events:none}
.again{border-color:rgba(96,0,0,0.35);color:var(--danger)}
.good{border-color:rgba(0,88,0,0.35);color:var(--success)}
.bar{width:100%;max-width:var(--cap);display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:12px;user-select:none;font-family:monospace;letter-spacing:.2px}
.bottom-bar{padding-top:6px}
.list-link{cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px}
.list-link:hover{color:var(--text)}

/* ── overlay panel ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.25);z-index:100;justify-content:center;align-items:center}
.overlay.open{display:flex}
.panel{background:#fff;border-radius:var(--radius);box-shadow:0 20px 60px rgba(0,0,0,0.18);padding:28px 30px;width:90%;max-width:480px;max-height:80vh;overflow-y:auto}
.panel h2{margin:0 0 18px;font-size:18px;font-weight:600}
.panel-close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);min-width:auto;padding:0}
.list-item{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:background .1s}
.list-item:hover{background:#f8f9fa}
.list-item.active{border-color:var(--success);background:#f0fdf4}
.list-name{font-size:14px;font-weight:500}
.list-meta{font-size:11px;color:var(--muted)}
.list-delete{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;min-width:auto;padding:4px 8px}
.list-delete:hover{color:var(--danger)}
.list-actions{display:flex;gap:2px;align-items:center}
.list-dl{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;min-width:auto;padding:4px 8px}
.list-dl:hover{color:var(--text)}
.upload-btn{display:block;width:100%;padding:14px;border:2px dashed var(--border);border-radius:12px;background:none;color:var(--muted);font-size:14px;cursor:pointer;text-align:center;margin-top:4px;min-width:auto}
.upload-btn:hover{border-color:var(--muted);color:var(--text)}

/* ── upload form ── */
.upload-form{display:none;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.upload-form.open{display:block}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.form-row input,.form-row select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit}
.form-row input:focus,.form-row select:focus{outline:none;border-color:var(--muted)}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.form-actions button{min-width:100px}
.btn-primary{background:var(--text);color:#fff;border:none}
.msg{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:12px;display:none}
.msg.error{display:block;background:#fef2f2;color:var(--danger);border:1px solid rgba(96,0,0,0.15)}
.msg.success{display:block;background:#f0fdf4;color:var(--success);border:1px solid rgba(0,88,0,0.15)}

@media(max-width:420px){:root{--cap:100%}.card-text{font-size:24px}button{min-width:110px}.panel{padding:20px 18px}}

/* ── RS export/import ── */
.rs-section{margin-top:18px;padding-top:16px;border-top:1px solid var(--border)}
.rs-title{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.rs-actions{display:flex;gap:8px}
.rs-btn{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:#fff;color:var(--text);font-size:13px;cursor:pointer;text-align:center;min-width:auto}
.rs-btn:hover{background:#f8f9fa}
</style>
</head>
<body>
<div class="shell">
  <div class="stage">
    <div class="card" id="card" tabindex="0">
      <div class="card-tag" id="cardTag"></div>
      <div class="card-text state-question" id="cardText">…</div>
    </div>
    <div class="btnrow">
      <button class="again" id="btnAgain" disabled>Again</button>
      <button class="good" id="btnGood" disabled>Good</button>
    </div>
    <div class="hint" id="hint"></div>
  </div>
  <div class="bar bottom-bar">
    <div>WordDock</div>
    <div class="list-link" id="listLink">NL→RU · 1</div>
    <div id="cBR">0/12</div>
  </div>
</div>

<!-- List picker overlay -->
<div class="overlay" id="overlay">
  <div class="panel">
    <button class="panel-close" id="panelClose">×</button>
    <h2>Woordenlijsten</h2>
    <div id="msg" class="msg"></div>
    <div id="listContainer"></div>
    <button class="upload-btn" id="uploadBtn">+ Upload nieuwe lijst (.xlsx)</button>
    <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
    <div class="upload-form" id="uploadForm">
      <div class="form-row">
        <label>Taalpaar</label>
        <select id="fLang">
          <option value="NL→RU">NL → RU</option>
          <option value="NL→EN">NL → EN</option>
          <option value="NL→FR">NL → FR</option>
          <option value="NL→DE">NL → DE</option>
          <option value="EN→RU">EN → RU</option>
          <option value="FR→RU">FR → RU</option>
          <option value="other">Anders…</option>
        </select>
      </div>
      <div class="form-row" id="customLangRow" style="display:none">
        <label>Aangepast taalpaar</label>
        <input type="text" id="fCustomLang" placeholder="bijv. ES→PT">
      </div>
      <div class="form-row">
        <label>Niveau</label>
        <select id="fLevel">
          <option value="">— geen —</option>
          <option value="A1">A1</option>
          <option value="A2">A2</option>
          <option value="B1">B1</option>
          <option value="B2">B2</option>
          <option value="C1">C1</option>
          <option value="C2">C2</option>
        </select>
      </div>
      <div class="form-row">
        <label>Beschrijving</label>
        <input type="text" id="fDesc" placeholder="bijv. Bewegingswerkwoorden">
      </div>
      <div class="form-actions">
        <button id="cancelUpload">Annuleren</button>
        <button class="btn-primary" id="confirmUpload">Importeren</button>
      </div>
    </div>
    <div class="rs-section">
      <div class="rs-title">Voortgang</div>
      <div class="rs-actions">
        <button class="rs-btn" id="rsExport">↓ Export voortgang</button>
        <button class="rs-btn" id="rsImport">↑ Import voortgang</button>
        <input type="file" id="rsFileInput" accept=".json" style="display:none">
      </div>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

const DEFAULT_LIST={
  id:"default_nlru1",
  name:"NL→RU · 1",
  lang:"NL→RU",
  level:"",
  desc:"Standaard",
  count:DEFAULT_DATA.length,
  isDefault:true
};

const MASTERY=6;

/* ═══════════════════════════════════════════
   IndexedDB — word list storage
   ═══════════════════════════════════════════ */
const DB_NAME="worddock";
const DB_VER=1;
let db=null;

function openDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains("lists")){
        d.createObjectStore("lists",{keyPath:"id"});
      }
    };
    req.onsuccess=e=>{db=e.target.result;resolve(db)};
    req.onerror=e=>reject(e);
  });
}

function dbPut(list){
  return new Promise((resolve,reject)=>{
    const tx=db.transaction("lists","readwrite");
    tx.objectStore("lists").put(list);
    tx.oncomplete=()=>resolve();
    tx.onerror=e=>reject(e);
  });
}

function dbGetAll(){
  return new Promise((resolve,reject)=>{
    const tx=db.transaction("lists","readonly");
    const req=tx.objectStore("lists").getAll();
    req.onsuccess=()=>resolve(req.result);
    req.onerror=e=>reject(e);
  });
}

function dbGet(id){
  return new Promise((resolve,reject)=>{
    const tx=db.transaction("lists","readonly");
    const req=tx.objectStore("lists").get(id);
    req.onsuccess=()=>resolve(req.result);
    req.onerror=e=>reject(e);
  });
}

function dbDelete(id){
  return new Promise((resolve,reject)=>{
    const tx=db.transaction("lists","readwrite");
    tx.objectStore("lists").delete(id);
    tx.oncomplete=()=>resolve();
    tx.onerror=e=>reject(e);
  });
}

/* ═══════════════════════════════════════════
   RS — localStorage
   ═══════════════════════════════════════════ */
let activeListId="default_nlru1";
let RS={};

function rsKey(){return "wd_rs_"+activeListId}
function loadRS(){try{RS=JSON.parse(localStorage.getItem(rsKey()))||{}}catch(e){RS={}}}
function getRS(id){return RS[id]||0}
function saveRS(){localStorage.setItem(rsKey(),JSON.stringify(RS))}

/* ═══════════════════════════════════════════
   ACTIVE DATA
   ═══════════════════════════════════════════ */
let ALL=DEFAULT_DATA;
let activeListMeta=DEFAULT_LIST;

async function switchList(listMeta){
  activeListMeta=listMeta;
  activeListId=listMeta.id;
  localStorage.setItem("wd_active_list",listMeta.id);
  if(listMeta.isDefault){
    ALL=DEFAULT_DATA;
  } else {
    const stored=await dbGet(listMeta.id);
    ALL=stored.data;
  }
  loadRS();
  initDeck();
  document.getElementById("listLink").textContent=listMeta.name;
  updateMastery();
}

function updateMastery(){
  const sum=ALL.reduce((s,l)=>s+Math.min(getRS(l.id),MASTERY),0);
  const pct=(sum/(ALL.length*MASTERY)*100).toFixed(2);
  const base=activeListMeta.name;
  document.getElementById("listLink").textContent=base+" · "+pct+"%";
}

/* ═══════════════════════════════════════════
   PIPE ENGINE
   ═══════════════════════════════════════════ */
let pipe=[];
let showingA=false;
let deckDone=false;
let deckScore=0;

function assembleDeck(){
  const sorted=ALL.slice().sort((a,b)=>{
    const d=getRS(a.id)-getRS(b.id);
    return d!==0?d:a.id-b.id;
  });
  return sorted.slice(0,Math.min(10,sorted.length));
}

function initDeck(){
  const lemmas=assembleDeck();
  pipe=lemmas.map(l=>({lemma:l,fi:0,passDirty:false,timesDirty:0,needsRedemption:false}));
  deckScore=0;
  deckDone=false;
  showingA=false;
  $card.style.background="";
  $text.style.color="";
  render();
}

function cur(){return pipe[0]}

function reveal(){
  if(deckDone||showingA)return;
  showingA=true;
  render();
}

function gradeGood(){
  if(!showingA||deckDone)return;
  showingA=false;
  const s=cur();
  s.fi++;

  if(s.fi>=s.lemma.pairs.length){
    s.fi=0;

    if(s.passDirty){
      s.passDirty=false;
      s.needsRedemption=true;
      render();
      return;
    }

    if(s.needsRedemption){
      s.needsRedemption=false;
      moveTo(3);
    } else {
      deckScore++;
      moveTo(9);
    }

    if(deckScore>=12&&!pipe.some(x=>x.passDirty)&&!pipe.some(x=>x.needsRedemption)){
      deckDone=true;
      pipe.forEach(x=>{
        const id=x.lemma.id;
        const old=getRS(id);
        if(x.timesDirty===0) RS[id]=old+1;
        else if(x.timesDirty===1) RS[id]=Math.max(0,old-1);
        else RS[id]=Math.max(0,old-2);
      });
      saveRS();
      updateMastery();
    }

    render();
    return;
  }

  render();
}

function gradeAgain(){
  if(!showingA||deckDone)return;
  showingA=false;
  const s=cur();

  if(!s.passDirty){
    s.passDirty=true;
    s.timesDirty++;
  }

  render();
}

function moveTo(targetIdx){
  const s=pipe.shift();
  const i=Math.min(targetIdx,pipe.length);
  pipe.splice(i,0,s);
}

/* ═══════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════ */
const $card=document.getElementById("card");
const $text=document.getElementById("cardText");
const $tag=document.getElementById("cardTag");
const $hint=document.getElementById("hint");
const $bA=document.getElementById("btnAgain");
const $bG=document.getElementById("btnGood");
const $cBR=document.getElementById("cBR");

function render(){
  if(deckDone){
    $tag.textContent='';
    $text.textContent="Another WordDeck Done!";
    $text.className="card-text state-answer";
    $hint.textContent="Click, enter or space for next deck";
    $bA.disabled=true;$bG.disabled=true;
    $cBR.textContent=deckScore+"/12 \u2713";
    $card.style.background="#507693";
    $text.style.color="#ffffff";
	    return;
  }
  const s=cur();
  const field=s.lemma.pairs[s.fi];
  $tag.textContent=s.lemma.tag||'';
  if(showingA){
    $text.textContent=field.a;
    $text.className="card-text state-answer";
    $bA.disabled=false;$bG.disabled=false;
  }else{
    $text.textContent=field.q;
    $text.className="card-text state-question";
    $bA.disabled=true;$bG.disabled=true;
  }
  $hint.textContent="";
  $cBR.textContent=deckScore+"/12";
}

/* ═══════════════════════════════════════════
   INPUT
   ═══════════════════════════════════════════ */
$card.addEventListener("click",()=>{
  if(deckDone){initDeck();return;}
  if(!showingA)reveal();
});
$bG.addEventListener("click",e=>{gradeGood();e.target.blur()});
$bA.addEventListener("click",e=>{gradeAgain();e.target.blur()});
document.addEventListener("keydown",e=>{
  if(document.querySelector('.overlay.open'))return; // don't capture keys when panel is open
  if(e.key===" "||e.key==="Enter"){
    e.preventDefault();
    if(deckDone){initDeck();return;}
    if(!showingA)reveal();else gradeGood();
  }
  if((e.key==="ArrowLeft"||e.key==="p"||e.key==="P")&&showingA&&!deckDone){
    e.preventDefault();gradeAgain();
  }
});

/* ═══════════════════════════════════════════
   LIST PICKER & UPLOAD
   ═══════════════════════════════════════════ */
const $overlay=document.getElementById("overlay");
const $listContainer=document.getElementById("listContainer");
const $uploadForm=document.getElementById("uploadForm");
const $fileInput=document.getElementById("fileInput");
const $msg=document.getElementById("msg");

document.getElementById("listLink").addEventListener("click",()=>openPanel());
document.getElementById("panelClose").addEventListener("click",()=>closePanel());
$overlay.addEventListener("click",e=>{if(e.target===$overlay)closePanel()});

document.getElementById("uploadBtn").addEventListener("click",()=>{
  $fileInput.click();
});

document.getElementById("fLang").addEventListener("change",e=>{
  document.getElementById("customLangRow").style.display=e.target.value==="other"?"block":"none";
});

document.getElementById("cancelUpload").addEventListener("click",()=>{
  $uploadForm.classList.remove("open");
  pendingData=null;
});

document.getElementById("confirmUpload").addEventListener("click",()=>finalizeUpload());

let pendingData=null;

$fileInput.addEventListener("change",e=>{
  const file=e.target.files[0];
  if(!file)return;
  $fileInput.value="";

  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=new Uint8Array(ev.target.result);
      const wb=XLSX.read(data,{type:"array"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:""});

      if(!rows.length){showMsg("error","Bestand is leeg.");return;}

      // Check required columns
      const cols=Object.keys(rows[0]);
      const hasId=cols.some(c=>c.toUpperCase()==="ID");
      const hasQ1=cols.some(c=>c.toUpperCase()==="Q1");
      const hasA1=cols.some(c=>c.toUpperCase()==="A1");

      if(!hasId||!hasQ1||!hasA1){
        showMsg("error","Verplichte kolommen ontbreken: ID, Q1, A1. Controleer je bestand.");
        return;
      }

      // Parse lemmas
      const lemmas=[];
      for(const row of rows){
        // Normalize column access (case-insensitive)
        const get=key=>{
          const k=Object.keys(row).find(c=>c.toUpperCase()===key.toUpperCase());
          return k?String(row[k]||"").trim():"";
        };

        const pairs=[];
        for(let i=1;i<=10;i++){
          const q=get("Q"+i);
          const a=get("A"+i);
          if(q&&a) pairs.push({q:q.replace(/[\n\r]/g," "),a:a.replace(/[\n\r]/g," ")});
        }
        if(!pairs.length)continue;

        const gc=get("GRAMCAT");
        const gt=get("GRAMTAG");
        let tag=gc;
        if(gt) tag=gc?(gc+' \u00b7 '+gt):gt;

        const idVal=get("ID");
        lemmas.push({id:parseInt(idVal)||lemmas.length+1, tag, pairs});
      }

      if(!lemmas.length){
        showMsg("error","Geen geldige lemma's gevonden. Elke rij moet minstens Q1 en A1 bevatten.");
        return;
      }

      showMsg("success",lemmas.length+" lemma's gevonden in "+file.name+". Vul de gegevens in.");
      pendingData={lemmas,fileName:file.name};
      $uploadForm.classList.add("open");

    }catch(err){
      showMsg("error","Fout bij het lezen van het bestand: "+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
});

async function finalizeUpload(){
  if(!pendingData)return;

  const langSel=document.getElementById("fLang");
  let lang=langSel.value;
  if(lang==="other"){
    lang=document.getElementById("fCustomLang").value.trim();
    if(!lang){showMsg("error","Vul een taalpaar in.");return;}
  }
  const level=document.getElementById("fLevel").value;
  const desc=document.getElementById("fDesc").value.trim();

  // Build display name
  let name=lang;
  if(level) name+=" \u00b7 "+level;
  if(desc) name+=" \u00b7 "+desc;

  // System ID: unique, based on timestamp
  const sysId="list_"+Date.now()+"_"+Math.random().toString(36).substr(2,6);

  const listObj={
    id:sysId,
    name,
    lang,
    level,
    desc,
    count:pendingData.lemmas.length,
    data:pendingData.lemmas,
    isDefault:false,
    created:new Date().toISOString()
  };

  try{
    await dbPut(listObj);
    showMsg("success","Lijst '"+name+"' opgeslagen! ("+listObj.count+" lemma's)");
    $uploadForm.classList.remove("open");
    pendingData=null;

    // Switch to new list
    await switchList({id:sysId,name,lang,level,desc,count:listObj.count,isDefault:false});
    setTimeout(()=>closePanel(),800);

  }catch(err){
    showMsg("error","Opslaan mislukt: "+err.message);
  }
}

async function openPanel(){
  $msg.className="msg";$msg.textContent="";
  $uploadForm.classList.remove("open");
  pendingData=null;

  // Build list
  const stored=await dbGetAll();
  $listContainer.innerHTML="";

  // Default list
  const allLists=[DEFAULT_LIST,...stored.map(s=>({
    id:s.id,name:s.name,lang:s.lang,level:s.level,desc:s.desc,count:s.count,isDefault:false
  }))];

  for(const li of allLists){
    const div=document.createElement("div");
    div.className="list-item"+(li.id===activeListId?" active":"");
    div.innerHTML=`
      <div>
        <div class="list-name">${esc(li.name)}</div>
        <div class="list-meta">${li.count} lemma's</div>
      </div>
      <div class="list-actions">
        <button class="list-dl" title="Downloaden">\u2913</button>
        ${li.isDefault?"":'<button class="list-delete" title="Verwijderen">\u00d7</button>'}
      </div>
    `;
    div.addEventListener("click",async e=>{
      if(e.target.classList.contains("list-delete")){
        if(confirm("Lijst '"+li.name+"' verwijderen?")){
          await dbDelete(li.id);
          if(li.id===activeListId) await switchList(DEFAULT_LIST);
          openPanel();
        }
        return;
      }
      if(e.target.classList.contains("list-dl")){
        await downloadList(li.id);
        return;
      }
      await switchList(li);
      closePanel();
    });
    $listContainer.appendChild(div);
  }

  $overlay.classList.add("open");
}

function closePanel(){
  $overlay.classList.remove("open");
  $card.focus();
}

function showMsg(type,text){
  $msg.className="msg "+type;
  $msg.textContent=text;
}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

/* ═══════════════════════════════════════════
   RS EXPORT / IMPORT
   ═══════════════════════════════════════════ */
document.getElementById("rsExport").addEventListener("click",()=>{
  // Collect all RS keys from localStorage
  const allRS={};
  for(let i=0;i<localStorage.length;i++){
    const key=localStorage.key(i);
    if(key.startsWith("wd_rs_")){
      try{allRS[key]=JSON.parse(localStorage.getItem(key))}catch(e){}
    }
  }
  // Also save the active list preference
  allRS._activeList=localStorage.getItem("wd_active_list")||"default_nlru1";

  const blob=new Blob([JSON.stringify(allRS,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  const date=new Date().toISOString().slice(0,10);
  a.download="worddock_voortgang_"+date+".json";
  a.click();
  URL.revokeObjectURL(url);
  showMsg("success","Voortgang geëxporteerd. Bewaar het bestand op een veilige plek.");
});

const $rsFileInput=document.getElementById("rsFileInput");
document.getElementById("rsImport").addEventListener("click",()=>{
  $rsFileInput.click();
});

$rsFileInput.addEventListener("change",e=>{
  const file=e.target.files[0];
  if(!file)return;
  $rsFileInput.value="";

  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      let count=0;

      for(const[key,val] of Object.entries(data)){
        if(key==="_activeList"){
          localStorage.setItem("wd_active_list",val);
          continue;
        }
        if(key.startsWith("wd_rs_")){
          localStorage.setItem(key,JSON.stringify(val));
          count++;
        }
      }

      // Reload RS for active list
      loadRS();
      initDeck();
      showMsg("success","Voortgang geïmporteerd: "+count+" lijst(en). Je scores zijn hersteld.");
    }catch(err){
      showMsg("error","Ongeldig bestand: "+err.message);
    }
  };
  reader.readAsText(file);
});
async function downloadList(id){
  try{
    let data,name;
    if(id==="default_nlru1"){
      data=DEFAULT_DATA;
      name=DEFAULT_LIST.name;
    } else {
      const stored=await dbGet(id);
      if(!stored){showMsg("error","Lijst niet gevonden.");return;}
      data=stored.data;
      name=stored.name||"worddock";
    }

    const rows=[];
    for(const lemma of data){
      const row={ID:lemma.id,GRAMCAT:"",GRAMTAG:""};
      if(lemma.tag){
        const parts=lemma.tag.split(" \u00b7 ");
        row.GRAMCAT=parts[0]||"";
        row.GRAMTAG=parts[1]||"";
      }
      for(let i=0;i<lemma.pairs.length;i++){
        row["Q"+(i+1)]=lemma.pairs[i].q;
        row["A"+(i+1)]=lemma.pairs[i].a;
      }
      rows.push(row);
    }

    const ws=XLSX.utils.json_to_sheet(rows);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"WordDock");
    const fileName=name.replace(/[^a-zA-Z0-9\u00b7→_ -]/g,"_")+".xlsx";
    XLSX.writeFile(wb,fileName);
  }catch(err){
    showMsg("error","Download mislukt: "+err.message);
  }
}

/* ═══════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════ */
(async()=>{
  await openDB();

  // Restore last active list
  const lastId=localStorage.getItem("wd_active_list");
  if(lastId && lastId!=="default_nlru1"){
    try{
      const stored=await dbGet(lastId);
      if(stored){
        await switchList({id:stored.id,name:stored.name,lang:stored.lang,level:stored.level,desc:stored.desc,count:stored.count,isDefault:false});
        $card.focus();
        return;
      }
    }catch(e){}
  }

  // Default
  loadRS();
  initDeck();
  updateMastery();
  $card.focus();
})();
</script>
